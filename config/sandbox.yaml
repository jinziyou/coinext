# Coinext — sandbox overrides (merged on top of config/base.yaml).
#
# Environment::Sandbox (docs/ARCHITECTURE.md §1, §5): a LiveClock + LIVE market data, but the
# testnet execution variant of the ExecutionClient port. This is the sandbox-vs-backtest parity
# acceptance gate (build order step 18): real timing + real data, but venue-paper execution, so we
# can diff sandbox results against the deterministic backtest before promoting to live.
env: sandbox

venue:
  # Route trading to Binance testnet endpoints; public market-data streams remain real.
  testnet: true
  # API key/secret supplied via env/secrets: COINEXT__BINANCE__API_KEY / COINEXT__BINANCE__API_SECRET.

data:
  lake_root: /data        # warm-up still served from the LOCAL HistoryReader (identical to backtest)

# Conservative live-shaped limits while validating in paper. The out-of-band risk-monitor watches
# PnL/positions and can trip kill_switch.
risk:
  max_order_notional: 25000
  max_position_notional: 100000
  max_gross_exposure: 250000
  max_orders_per_sec: 10
  kill_switch: false

# MUST match backtest/live economics for the sandbox-vs-backtest gate to be meaningful.
brokerage:
  maker_fee: 0.0002
  taker_fee: 0.0004
  slippage_bps: 1.0
  latency_ns: 5000000

# Full infra: the trader consumes normalized market data from the ingestor over Redis Streams.
redis:
  url: redis://redis:6379/0

postgres:
  dsn: postgresql://coinext:coinext@postgres:5432/coinext

minio:
  endpoint: http://minio:9000

otel:
  endpoint: http://otel-collector:4317

log:
  level: debug              # verbose while validating parity in the sandbox
