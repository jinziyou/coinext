# Coinext — local DEV overrides.
#
# Layered on top of docker-compose.yml (and optionally docker-compose.obs.yml):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#   # with observability:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.obs.yml up -d
#
# What this overlay changes vs prod:
#   * Exposes every service port on localhost so you can hit them directly.
#   * Bind-mounts source into the Python/UI containers for fast iteration (no rebuild for code edits).
#   * Switches long-running app processes to hot-reload entrypoints where the runtime supports it.
#
# HOT-RELOAD NOTES
#   * api (FastAPI/uvicorn): `--reload` watches the bind-mounted python/ tree. NOTE the compiled
#     coinext_py extension is built into the image; if you change Rust under crates/coinext-py you must
#     rebuild (`just py-build` locally, or `docker compose build api`). Pure-Python edits reload.
#   * trader / risk-monitor: bind-mounted source; restart the container to pick up changes, or run
#     them under `watchfiles` (see commented command). The Kernel itself is the compiled coinext_py.
#   * ingestor / exec-svc (Rust): no in-container hot reload — rebuild the image, or run the binary
#     on the host with `cargo run -p coinext-ingest` / `-p coinext-exec-svc` against the dev infra ports below.
#   * ui (Vite): for true HMR run `npm run dev` on the host (port 5173); this overlay still serves
#     the built static bundle via nginx on :3000 for an integration-like view.

name: coinext

services:
  # --- Infra: expose ports to the host for psql / redis-cli / mc / browser console ---
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console

  # --- Rust hot path: expose metrics + control; rebuild image to change code ---
  ingestor:
    ports:
      - "9101:9101"   # prometheus metrics
    environment:
      COINEXT__LOG__LEVEL: debug

  exec-svc:
    ports:
      - "9102:9102"   # prometheus metrics
      - "8081:8081"   # control/admin API
    environment:
      COINEXT__LOG__LEVEL: debug

  # --- Python control plane: bind-mount source for fast iteration ---
  trader:
    ports:
      - "9103:9103"   # prometheus metrics
    environment:
      COINEXT__LOG__LEVEL: debug
    volumes:
      - ./python:/app/python:ro
      - ./config:/app/config:ro
      - ./services/trader:/app/trader:ro
      - ./data:/data
    # Restart-to-reload by default. For auto-reload uncomment:
    # command: ["uv", "run", "watchfiles", "python -m main", "python", "trader"]

  risk-monitor:
    ports:
      - "9104:9104"   # prometheus metrics
    environment:
      COINEXT__LOG__LEVEL: debug
    volumes:
      - ./python:/app/python:ro
      - ./config:/app/config:ro
      - ./services/risk-monitor:/app/risk_monitor:ro

  api:
    ports:
      - "8000:8000"
    environment:
      COINEXT__LOG__LEVEL: debug
    volumes:
      - ./python:/app/python:ro
      - ./config:/app/config:ro
      - ./services/api:/app/api:ro
      - ./data:/data
    # uvicorn auto-reload on the bind-mounted app + python/ tree (pure-Python changes only; see header note).
    command: ["uvicorn", "app:app", "--app-dir", "/app/api", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/api", "--reload-dir", "/app/python"]

  # --- UI: serve the built bundle on :3000; use host `npm run dev` for HMR ---
  ui:
    ports:
      - "3000:80"
