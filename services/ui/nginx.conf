# Coinext UI — nginx server config for the static Vite/React SPA (deploy/docker/ui.Dockerfile).
#
# Two jobs:
#   1. Serve the built bundle from /usr/share/nginx/html with history-API fallback so client-side
#      routes (e.g. /runs, /positions) resolve to index.html instead of 404.
#   2. Proxy /api/* to the `api` service (FastAPI, :8000) so the browser can use a same-origin
#      VITE_API_BASE=/api and avoid CORS. WebSocket upgrade is forwarded for /api/ws/live.
#
# The upstream host is the compose service name `api`; override at build/deploy time if needed.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the entrypoint (so a new bundle is picked up immediately).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long-cache the fingerprinted Vite assets.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history-API fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the control-plane API (same-origin VITE_API_BASE=/api avoids CORS). The trailing
    # slash on proxy_pass strips the /api prefix so /api/runs -> http://api:8000/runs.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (the api exposes /ws/live for live position/PnL telemetry).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
