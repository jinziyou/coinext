# Coinext — production topology (single-VPS docker-compose).
#
# This is the canonical service graph described in docs/ARCHITECTURE.md §8:
#   * Rust hot path:  ingestor (coinext-ingest), exec-svc (coinext-exec-svc)
#   * Python control plane: trader (coinext_live), risk-monitor, api (FastAPI)
#   * UI: static Vite build served by nginx
#   * Infra: postgres (event/audit store), redis (Redis-Streams bus), minio (S3 data lake)
#
# Topology mirrors the parity model: the SAME engines run in every environment; only the Kernel's
# injected Clock / Cache / clients differ (set via COINEXT__ENV and the Binance section). The in-process
# bus is the default hot path; Redis Streams is the cross-service / telemetry seam (the `trader`
# DataEngine consumes the `ingestor`'s normalized frames over Redis; see ARCHITECTURE.md §6/§7).
#
# Observability (otel-collector, prometheus, grafana, loki, tempo) is an OVERLAY — bring it up with:
#   docker compose -f docker-compose.yml -f docker-compose.obs.yml up -d
# Local dev overrides (exposed ports, source bind-mounts, hot reload) live in docker-compose.dev.yml.
#
# Env is loaded from .env (copy .env.example -> .env). Config precedence, per ARCHITECTURE.md:
#   CLI flags > env (COINEXT__SECTION__KEY) > config/*.yaml > built-in defaults.

name: coinext

# ---------------------------------------------------------------------------------------------
# Reusable anchors
# ---------------------------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-common: &app-common
  restart: always
  env_file: .env
  logging: *default-logging
  networks: [coinext-net]

services:
  # =============================================================================================
  # Infrastructure
  # =============================================================================================

  # PostgreSQL — append-only OrderEvent store + audit/reconciliation truth (coinext-persistence).
  postgres:
    image: postgres:16
    restart: always
    env_file: .env
    environment:
      # The app reads COINEXT__POSTGRES__DSN; these POSTGRES_* drive the image's initdb. Keep in sync.
      POSTGRES_USER: coinext
      POSTGRES_PASSWORD: coinext
      POSTGRES_DB: coinext
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinext -d coinext"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [coinext-net]
    logging: *default-logging

  # Redis — Redis-Streams bus (versioned MessagePack Envelope) + ephemeral coordination.
  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [coinext-net]
    logging: *default-logging

  # MinIO — S3-compatible object store backing the Parquet data lake (coinext_data / DataLake catalog).
  minio:
    image: minio/minio
    restart: always
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${COINEXT__MINIO__ACCESS_KEY:-coinext}
      MINIO_ROOT_PASSWORD: ${COINEXT__MINIO__SECRET_KEY:-coinext-secret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [coinext-net]
    logging: *default-logging

  # =============================================================================================
  # Rust hot path
  # =============================================================================================

  # ingestor (coinext-ingest) — normalizes Binance WS frames and republishes on the Redis bus.
  # SLO histogram: ingest_to_publish_ns. Metrics on :9101.
  ingestor:
    <<: *app-common
    build:
      context: .
      dockerfile: deploy/docker/ingestor.Dockerfile
    environment:
      COINEXT__SERVICE: ingestor
      COINEXT__METRICS__PORT: "9101"
      COINEXT__REDIS__URL: ${COINEXT__REDIS__URL:-redis://redis:6379/0}
      COINEXT__OTEL__ENDPOINT: ${COINEXT__OTEL__ENDPOINT:-http://otel-collector:4317}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Liveness via the Prometheus metrics endpoint (exposes /metrics + a /healthz route).
      test: ["CMD", "/app/coinext-ingest", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # exec-svc (coinext-exec-svc) — OMS/execution service: risk-gated routing, FSM driving, report folding.
  # SLO histogram: submit_to_ack_ns. Metrics on :9102, control/admin API on :8081.
  exec-svc:
    <<: *app-common
    build:
      context: .
      dockerfile: deploy/docker/exec-svc.Dockerfile
    environment:
      COINEXT__SERVICE: exec-svc
      COINEXT__METRICS__PORT: "9102"
      COINEXT__CONTROL__PORT: "8081"
      COINEXT__REDIS__URL: ${COINEXT__REDIS__URL:-redis://redis:6379/0}
      COINEXT__POSTGRES__DSN: ${COINEXT__POSTGRES__DSN:-postgresql://coinext:coinext@postgres:5432/coinext}
      COINEXT__OTEL__ENDPOINT: ${COINEXT__OTEL__ENDPOINT:-http://otel-collector:4317}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/coinext-exec-svc", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =============================================================================================
  # Python control plane
  # =============================================================================================

  # trader (coinext_live) — live TradingNode: the SAME engines as backtest, with LiveClock + Binance
  # clients injected by the Kernel. SLO histogram: strategy_dispatch_ns. Metrics on :9103.
  trader:
    <<: *app-common
    build:
      context: .
      dockerfile: deploy/docker/trader.Dockerfile
    environment:
      COINEXT__SERVICE: trader
      COINEXT__METRICS__PORT: "9103"
      COINEXT__REDIS__URL: ${COINEXT__REDIS__URL:-redis://redis:6379/0}
      COINEXT__POSTGRES__DSN: ${COINEXT__POSTGRES__DSN:-postgresql://coinext:coinext@postgres:5432/coinext}
      COINEXT__OTEL__ENDPOINT: ${COINEXT__OTEL__ENDPOINT:-http://otel-collector:4317}
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      exec-svc:
        condition: service_started
      ingestor:
        condition: service_started

  # risk-monitor — out-of-band watcher: tails all PnL/positions and can trip the global kill-switch.
  # Independent of the trader process by design (ARCHITECTURE.md §7). Metrics on :9104.
  risk-monitor:
    <<: *app-common
    build:
      context: .
      dockerfile: deploy/docker/risk-monitor.Dockerfile
    environment:
      COINEXT__SERVICE: risk-monitor
      COINEXT__METRICS__PORT: "9104"
      COINEXT__REDIS__URL: ${COINEXT__REDIS__URL:-redis://redis:6379/0}
      COINEXT__POSTGRES__DSN: ${COINEXT__POSTGRES__DSN:-postgresql://coinext:coinext@postgres:5432/coinext}
      COINEXT__OTEL__ENDPOINT: ${COINEXT__OTEL__ENDPOINT:-http://otel-collector:4317}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # api (FastAPI) — control-plane REST/WS for the UI. Embeds coinext_py (maturin) for domain types.
  # Serves on :8000.
  api:
    <<: *app-common
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      COINEXT__SERVICE: api
      COINEXT__API__HOST: "0.0.0.0"
      COINEXT__API__PORT: "8000"
      COINEXT__REDIS__URL: ${COINEXT__REDIS__URL:-redis://redis:6379/0}
      COINEXT__POSTGRES__DSN: ${COINEXT__POSTGRES__DSN:-postgresql://coinext:coinext@postgres:5432/coinext}
      COINEXT__OTEL__ENDPOINT: ${COINEXT__OTEL__ENDPOINT:-http://otel-collector:4317}
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ui — static Vite/React dashboard served by nginx. Talks to the api at COINEXT__UI__API_BASE.
  ui:
    <<: *app-common
    build:
      context: .
      dockerfile: deploy/docker/ui.Dockerfile
      args:
        # Baked at build time (Vite inlines VITE_* into the static bundle).
        VITE_API_BASE: ${COINEXT__UI__API_BASE:-http://localhost:8000}
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

# ---------------------------------------------------------------------------------------------
# Networks & volumes
# ---------------------------------------------------------------------------------------------
networks:
  coinext-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  # Shared local data lake / HistoryReader root (warm-up is always served locally, never live REST).
  data:
