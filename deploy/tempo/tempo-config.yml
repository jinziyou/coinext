# VeloxQuant — Tempo config (single-binary, local storage; ARCHITECTURE.md §8).
# Receives spans from the otel-collector via OTLP. trace_id originates in the Redis Envelope and
# propagates across services, so a single trace can span ingestor -> trader -> exec-svc.
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h          # 7 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Generate service-graph + span (RED) metrics into Prometheus for the dashboard's service map.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
